<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 主渐变色 - 翠绿色 -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1ABC9C"/>
      <stop offset="100%" style="stop-color:#10AC84"/>
    </linearGradient>
    
    <!-- 金色渐变（用于认证/VIP） -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA000"/>
    </linearGradient>
    
    <!-- 背景模糊效果 -->
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
    
    <!-- 阴影效果 - 翠绿色阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1ABC9C" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景圆形（毛玻璃效果模拟） -->
  <circle cx="100" cy="100" r="90" fill="url(#primaryGradient)" opacity="0.1"/>
  <circle cx="100" cy="100" r="85" fill="white" opacity="0.9"/>
  
  <!-- 外圈光环 -->
  <circle cx="100" cy="100" r="75" stroke="url(#primaryGradient)" stroke-width="3" fill="none" opacity="0.3"/>
  
  <!-- 主Logo：X 变形为购物袋/手机轮廓 -->
  <g filter="url(#shadow)">
    <!-- X 的左半边 - 类似手机侧边 -->
    <path d="M60 50 L85 100 L60 150" 
          stroke="url(#primaryGradient)" 
          stroke-width="12" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none"/>
    
    <!-- X 的右半边 - 购物袋提手/手机轮廓 -->
    <path d="M140 50 L115 100 L140 150" 
          stroke="url(#primaryGradient)" 
          stroke-width="12" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none"/>
    
    <!-- 交叉点 - 数码芯片/认证徽章 -->
    <circle cx="100" cy="100" r="18" fill="url(#primaryGradient)"/>
    
    <!-- 内部星星/芯片触点 -->
    <circle cx="100" cy="100" r="8" fill="white"/>
    
    <!-- 认证标识（小圆点） -->
    <circle cx="155" cy="45" r="8" fill="url(#goldGradient)"/>
    <path d="M152 45 L154 47 L158 43" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  
  <!-- 底部装饰线 -->
  <path d="M60 165 L140 165" stroke="url(#primaryGradient)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  
  <!-- 底部装饰点 -->
  <circle cx="80" cy="165" r="3" fill="#1ABC9C" opacity="0.3"/>
  <circle cx="120" cy="165" r="3" fill="#10AC84" opacity="0.3"/>
</svg>