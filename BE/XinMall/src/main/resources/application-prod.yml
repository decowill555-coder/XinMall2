server:
  port: 8080
  base-url: https://api.xinmall.com

spring:
  application:
    name: xinmall
  main:
    allow-bean-definition-overriding: true
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/xinmall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: xinmall_user
    password: your_secure_password
  
  data:
    redis:
      host: localhost
      port: 6379
      password: your_redis_password
      database: 0

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.example.xinmall.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: your-production-secret-key-at-least-256-bits-long-please-change-this
  expiration: 86400000
  header: Authorization
  prefix: Bearer

upload:
  path: /var/www/xinmall/uploads
  url-prefix: /uploads

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

knife4j:
  enable: false
